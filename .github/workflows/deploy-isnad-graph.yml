name: Deploy isnad-graph

on:
  repository_dispatch:
    types: [deploy-isnad-graph]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        default: 'latest'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1
        env:
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: NEO4J_PASSWORD,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,REDIS_PASSWORD,AUTH_GOOGLE_CLIENT_ID,AUTH_GOOGLE_CLIENT_SECRET,AUTH_GITHUB_CLIENT_ID,AUTH_GITHUB_CLIENT_SECRET,GRAFANA_ADMIN_PASSWORD,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/noorinalabs-deploy

            echo "==> Pulling latest deploy config..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env for docker-compose..."
            env_file=".env"
            : > "$env_file"
            for var in NEO4J_PASSWORD POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB \
                       REDIS_PASSWORD AUTH_GOOGLE_CLIENT_ID AUTH_GOOGLE_CLIENT_SECRET \
                       AUTH_GITHUB_CLIENT_ID AUTH_GITHUB_CLIENT_SECRET \
                       GRAFANA_ADMIN_PASSWORD; do
              eval "val=\$$var"
              echo "$var=\"$val\"" >> "$env_file"
            done
            echo "IMAGE_TAG=\"${IMAGE_TAG}\"" >> "$env_file"
            echo "CACHEBUST=\"$(date +%s)\"" >> "$env_file"
            chmod 600 "$env_file"

            echo "==> Pulling latest isnad-graph source (for local builds)..."
            cd /opt/isnad-graph
            git fetch origin main
            git reset --hard origin/main
            cd /opt/noorinalabs-deploy

            echo "==> Attempting GHCR image pull..."
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env pull api frontend 2>/dev/null || echo "GHCR pull failed — will build locally"

            echo "==> Starting services (builds locally if no GHCR image)..."
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env up -d --build --force-recreate --remove-orphans

            echo "==> Waiting for services to stabilize..."
            sleep 15

      - name: Verify health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/noorinalabs-deploy

            echo "==> Checking service health via Docker..."
            for i in $(seq 1 24); do
              api_health=$(docker inspect --format='{{.State.Health.Status}}' noorinalabs-api-1 2>/dev/null || echo "not_found")
              echo "Attempt $i/24: API=$api_health"
              if [ "$api_health" = "healthy" ]; then
                echo "API health check passed"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "ERROR: API health check failed after 120 seconds"
                docker compose -f compose/docker-compose.prod.yml logs --tail=50 api
                exit 1
              fi
              sleep 5
            done

            echo "==> Checking all container health..."
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env ps --format '{{.Name}}\t{{.Status}}'
            echo "==> Deployment verified successfully"

      - name: Report deployment status
        if: always()
        run: |
          echo "## Deploy isnad-graph: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "- **Source repo:** ${{ github.event.client_payload.repo }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Source SHA:** ${{ github.event.client_payload.sha }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Source ref:** ${{ github.event.client_payload.ref }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Image tag:** ${{ steps.tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
