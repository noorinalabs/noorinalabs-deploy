name: Deploy All Services

on:
  workflow_dispatch:
    inputs:
      isnad_image_tag:
        description: 'isnad-graph image tag'
        default: 'latest'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Full stack deploy
        uses: appleboy/ssh-action@v1
        env:
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          IMAGE_TAG: ${{ inputs.isnad_image_tag }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: NEO4J_PASSWORD,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,REDIS_PASSWORD,AUTH_GOOGLE_CLIENT_ID,AUTH_GOOGLE_CLIENT_SECRET,AUTH_GITHUB_CLIENT_ID,AUTH_GITHUB_CLIENT_SECRET,GRAFANA_ADMIN_PASSWORD,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/noorinalabs-deploy
            git fetch origin main && git reset --hard origin/main

            env_file=".env"
            : > "$env_file"
            for var in NEO4J_PASSWORD POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB \
                       REDIS_PASSWORD AUTH_GOOGLE_CLIENT_ID AUTH_GOOGLE_CLIENT_SECRET \
                       AUTH_GITHUB_CLIENT_ID AUTH_GITHUB_CLIENT_SECRET \
                       GRAFANA_ADMIN_PASSWORD; do
              eval "val=\$$var"
              echo "$var=\"$val\"" >> "$env_file"
            done
            echo "IMAGE_TAG=\"${IMAGE_TAG}\"" >> "$env_file"
            echo "CACHEBUST=\"$(date +%s)\"" >> "$env_file"
            chmod 600 "$env_file"

            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env pull 2>/dev/null || true
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env up -d --force-recreate --remove-orphans
            sleep 15

            for i in $(seq 1 24); do
              api_health=$(docker inspect --format='{{.State.Health.Status}}' noorinalabs-api-1 2>/dev/null || echo "not_found")
              if [ "$api_health" = "healthy" ]; then echo "All services healthy"; break; fi
              if [ "$i" -eq 24 ]; then echo "Health check timeout"; exit 1; fi
              sleep 5
            done
