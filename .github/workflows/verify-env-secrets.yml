name: Verify env-scope secrets (TEMPORARY)
on:
  workflow_dispatch:

jobs:
  verify-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      USER_POSTGRES_DB: ${{ secrets.USER_POSTGRES_DB }}
      USER_POSTGRES_PASSWORD: ${{ secrets.USER_POSTGRES_PASSWORD }}
      USER_POSTGRES_USER: ${{ secrets.USER_POSTGRES_USER }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      USER_REDIS_PASSWORD: ${{ secrets.USER_REDIS_PASSWORD }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      NEO4J_USER: ${{ secrets.NEO4J_USER }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      KAFKA_CLUSTER_ID: ${{ secrets.KAFKA_CLUSTER_ID }}
      KAFKA_UI_USER: ${{ secrets.KAFKA_UI_USER }}
      KAFKA_UI_PASSWORD: ${{ secrets.KAFKA_UI_PASSWORD }}
      DEPLOY_VPS_IP: ${{ secrets.DEPLOY_VPS_IP }}
    steps:
      - name: Hash env-scope secrets (staging)
        run: |
          for name in POSTGRES_DB POSTGRES_PASSWORD POSTGRES_USER \
                      USER_POSTGRES_DB USER_POSTGRES_PASSWORD USER_POSTGRES_USER \
                      REDIS_PASSWORD USER_REDIS_PASSWORD \
                      NEO4J_PASSWORD NEO4J_USER \
                      GRAFANA_ADMIN_PASSWORD \
                      KAFKA_CLUSTER_ID KAFKA_UI_USER KAFKA_UI_PASSWORD \
                      DEPLOY_VPS_IP; do
            val="${!name}"
            if [ -z "$val" ]; then
              printf "%-26s MISSING\n" "$name"
            else
              hash=$(printf '%s' "$val" | sha256sum | cut -c1-16)
              printf "%-26s %s (len=%d)\n" "$name" "$hash" "${#val}"
            fi
          done

  verify-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      USER_POSTGRES_DB: ${{ secrets.USER_POSTGRES_DB }}
      USER_POSTGRES_PASSWORD: ${{ secrets.USER_POSTGRES_PASSWORD }}
      USER_POSTGRES_USER: ${{ secrets.USER_POSTGRES_USER }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      USER_REDIS_PASSWORD: ${{ secrets.USER_REDIS_PASSWORD }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      NEO4J_USER: ${{ secrets.NEO4J_USER }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      KAFKA_CLUSTER_ID: ${{ secrets.KAFKA_CLUSTER_ID }}
      KAFKA_UI_USER: ${{ secrets.KAFKA_UI_USER }}
      KAFKA_UI_PASSWORD: ${{ secrets.KAFKA_UI_PASSWORD }}
      DEPLOY_VPS_IP: ${{ secrets.DEPLOY_VPS_IP }}
    steps:
      - name: Hash env-scope secrets (production)
        run: |
          for name in POSTGRES_DB POSTGRES_PASSWORD POSTGRES_USER \
                      USER_POSTGRES_DB USER_POSTGRES_PASSWORD USER_POSTGRES_USER \
                      REDIS_PASSWORD USER_REDIS_PASSWORD \
                      NEO4J_PASSWORD NEO4J_USER \
                      GRAFANA_ADMIN_PASSWORD \
                      KAFKA_CLUSTER_ID KAFKA_UI_USER KAFKA_UI_PASSWORD \
                      DEPLOY_VPS_IP; do
            val="${!name}"
            if [ -z "$val" ]; then
              printf "%-26s MISSING\n" "$name"
            else
              hash=$(printf '%s' "$val" | sha256sum | cut -c1-16)
              printf "%-26s %s (len=%d)\n" "$name" "$hash" "${#val}"
            fi
          done
