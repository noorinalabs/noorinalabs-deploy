name: Terraform
on:
  pull_request:
    paths: ['terraform/**']
  push:
    branches: [main]
    paths: ['terraform/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive terraform/

  validate:
    # Validates the child module and each env root module independently.
    # No backend is configured here (-backend=false) so this runs without credentials.
    name: Validate (${{ matrix.path }})
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - terraform/hetzner/modules/hetzner-vps
          - terraform/hetzner/envs/stg
          - terraform/hetzner/envs/prod
          - terraform/cloudflare
          - terraform/backblaze
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
      - name: Init (no backend)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate

  plan:
    name: Plan (${{ matrix.env }})
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [stg, prod]
    environment: ${{ matrix.env == 'prod' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: terraform/hetzner/envs/${{ matrix.env }}
    env:
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_B2_APP_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
      - name: Generate CI SSH key
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_key -N ""
          echo "TF_VAR_ssh_public_key_path=/tmp/ci_key.pub" >> "$GITHUB_ENV"
      - name: Init
        run: terraform init
      - name: Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true
      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ matrix.env }}';
            const output = `#### Terraform Plan (hetzner/${envName})
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply (${{ matrix.env }})
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Apply stg first, then prod — never both in parallel. Matches the
      # promotion sequencing deploy#84 will codify. Within this workflow, the
      # max-parallel=1 + ordered matrix gives us stg-before-prod for free.
      max-parallel: 1
      matrix:
        env: [stg, prod]
    environment: ${{ matrix.env == 'prod' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: terraform/hetzner/envs/${{ matrix.env }}
    env:
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_B2_APP_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
      - name: Generate CI SSH key
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_key -N ""
          echo "TF_VAR_ssh_public_key_path=/tmp/ci_key.pub" >> "$GITHUB_ENV"
      - name: Init
        run: terraform init
      - name: Apply
        run: terraform apply -auto-approve
