# Production Docker Compose — Noorina Labs deployment
# Location: noorinalabs-deploy/compose/docker-compose.prod.yml
# Usage: docker compose -f compose/docker-compose.prod.yml --env-file .env up -d
#
# All application services use pre-built GHCR images (no build contexts).
# Infrastructure services (neo4j, databases, observability) are configured here.

services:
  neo4j:
    build:
      context: ../infra/neo4j
      dockerfile: Dockerfile
    image: noorinalabs-isnad-graph-neo4j:5-community
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB must be set}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER must be set}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
    read_only: true
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend
    restart: unless-stopped

  api:
    image: ghcr.io/noorinalabs/noorinalabs-isnad-graph:${IMAGE_TAG:-latest}
    build:
      context: /opt/noorinalabs-isnad-graph
      dockerfile: Dockerfile
    expose:
      - "8000"
    # Security: read_only prevents runtime writes to the container filesystem.
    # The venv and application code are baked into the image at build time.
    # Only /tmp is writable at runtime (via tmpfs) for Python temp files.
    read_only: true
    tmpfs:
      # Python stdlib (tempfile, multiprocessing) and uvicorn need a writable /tmp
      - /tmp:size=256M
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      # NEO4J_USER must be "neo4j" — Neo4j requires the admin account to use this name
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      - PG_DSN=postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - AUTH_GOOGLE_CLIENT_ID=${AUTH_GOOGLE_CLIENT_ID:-}
      - AUTH_GOOGLE_CLIENT_SECRET=${AUTH_GOOGLE_CLIENT_SECRET:-}
      - AUTH_GITHUB_CLIENT_ID=${AUTH_GITHUB_CLIENT_ID:-}
      - AUTH_GITHUB_CLIENT_SECRET=${AUTH_GITHUB_CLIENT_SECRET:-}
      - AUTH_OAUTH_REDIRECT_BASE_URL=https://isnad-graph.noorinalabs.com
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - backend
      - frontend
    # Uses the venv baked into the image at build time — NOT `uv run`, which would
    # trigger a full dependency reinstall at startup and fail on a read_only filesystem.
    # This is the single source of truth for the uvicorn command (Dockerfile has no CMD).
    command: /app/.venv/bin/uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  frontend:
    image: ghcr.io/noorinalabs/noorinalabs-isnad-graph-frontend:${IMAGE_TAG:-latest}
    build:
      context: /opt/noorinalabs-isnad-graph/frontend
      dockerfile: Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-1}
    expose:
      - "80"
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/cache/nginx:size=128M
      - /run:size=16M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
    restart: unless-stopped

  landing:
    # GHCR-only — no local-build fallback. The deploy workflow logs into ghcr.io
    # using the auto-provisioned GITHUB_TOKEN (workflow `permissions: packages: read`
    # required, see .github/workflows/deploy-isnad-graph.yml). A manual
    # `docker compose up` on the VPS without prior `docker login ghcr.io` will fail
    # at pull — that's intentional; deploys go through the workflow. The api/frontend
    # services still have `build:` blocks pending the owner decision in #103.
    image: ghcr.io/noorinalabs/noorinalabs-landing-page:${LANDING_IMAGE_TAG:-latest}
    expose:
      - "80"
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/cache/nginx:size=128M
      - /run:size=16M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
    restart: unless-stopped

  # --- Reverse Proxy ---

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      landing:
        condition: service_healthy
      user-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - backend
      - frontend
    restart: unless-stopped

  # --- User Service ---

  user-service:
    image: ghcr.io/noorinalabs/noorinalabs-user-service:${USER_SERVICE_IMAGE_TAG:-latest}
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=256M
    environment:
      - DATABASE_URL=postgresql+asyncpg://${USER_POSTGRES_USER:?USER_POSTGRES_USER must be set}:${USER_POSTGRES_PASSWORD:?USER_POSTGRES_PASSWORD must be set}@user-postgres:5432/${USER_POSTGRES_DB:?USER_POSTGRES_DB must be set}
      - REDIS_URL=redis://:${USER_REDIS_PASSWORD:?USER_REDIS_PASSWORD must be set}@user-redis:6379/0
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY must be set}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY must be set}
      - CORS_ORIGINS=["https://isnad-graph.noorinalabs.com"]
      - AUTH_GOOGLE_CLIENT_ID=${AUTH_GOOGLE_CLIENT_ID:-}
      - AUTH_GOOGLE_CLIENT_SECRET=${AUTH_GOOGLE_CLIENT_SECRET:-}
      - AUTH_GITHUB_CLIENT_ID=${AUTH_GITHUB_CLIENT_ID:-}
      - AUTH_GITHUB_CLIENT_SECRET=${AUTH_GITHUB_CLIENT_SECRET:-}
      - AUTH_OAUTH_REDIRECT_BASE_URL=https://isnad-graph.noorinalabs.com
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      user-postgres:
        condition: service_healthy
      user-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - backend
      - user-backend
    command: /app/.venv/bin/uvicorn src.app.main:create_app --factory --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  user-postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: "${USER_POSTGRES_DB:?USER_POSTGRES_DB must be set}"
      POSTGRES_USER: "${USER_POSTGRES_USER:?USER_POSTGRES_USER must be set}"
      POSTGRES_PASSWORD: "${USER_POSTGRES_PASSWORD:?USER_POSTGRES_PASSWORD must be set}"
    volumes:
      - user_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER} -d ${USER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - user-backend
    restart: unless-stopped

  user-redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass "${USER_REDIS_PASSWORD:?USER_REDIS_PASSWORD must be set}"
    read_only: true
    tmpfs:
      - /tmp:size=64M
    volumes:
      - user_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${USER_REDIS_PASSWORD} redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - user-backend
    restart: unless-stopped

  user-postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${USER_POSTGRES_USER:?USER_POSTGRES_USER must be set}:${USER_POSTGRES_PASSWORD:?USER_POSTGRES_PASSWORD must be set}@user-postgres:5432/${USER_POSTGRES_DB:?USER_POSTGRES_DB must be set}?sslmode=disable"
    expose:
      - "9187"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - user-backend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # --- Observability ---

  prometheus:
    image: prom/prometheus:v3.4.0
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    volumes:
      - ../infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.6.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
      GF_SERVER_ROOT_URL: https://isnad-graph.noorinalabs.com/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  loki:
    image: grafana/loki:2.9.10
    volumes:
      - ../infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:2.9.10
    volumes:
      - ../infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - "-config.file=/etc/promtail/config.yml"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:v1.9.1
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # --- Pipeline messaging (Kafka KRaft, single-node) ---
  #
  # Single-broker Kafka in KRaft mode (no ZooKeeper). Used by the data
  # ingestion pipeline (noorinalabs-isnad-ingest-platform) to hand off
  # B2-path pointers between stages: raw → dedup → enrich → normalize → graph.
  #
  # Listener topology:
  #   INTERNAL   (kafka:9092)   — plaintext, backend-network only, used by
  #                              in-cluster producers/consumers and Kafka UI.
  #   CONTROLLER (kafka:9093)   — KRaft quorum (single-node election).
  #
  # The broker is NOT exposed to the host or the frontend network. All
  # operator access to the UI goes through a loopback port (8085) on the VPS;
  # remote access is only via SSH tunnel. Topic creation is handled by the
  # one-shot kafka-init service below.
  kafka:
    # bitnami/* namespace was sunset Aug 2025; images now live at bitnamilegacy/*.
    # Same image, same internal paths (/bitnami/kafka, /opt/bitnami/kafka/...) — only
    # the registry namespace changes. Long-term migration off Bitnami tracked in #100.
    image: bitnamilegacy/kafka:3.8.0
    user: "1001:1001"
    environment:
      # Core KRaft identity
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Cluster ID must be stable across restarts — supplied via env (see .env.example).
      KAFKA_KRAFT_CLUSTER_ID: "${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID must be set (generate once: docker run --rm bitnamilegacy/kafka:3.8.0 kafka-storage.sh random-uuid)}"
      # Listeners (plaintext, internal-only — backend network is docker-internal)
      KAFKA_CFG_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      # Durability / retention defaults (per-topic retention set by kafka-init)
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_MIN_INSYNC_REPLICAS: "1"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      # JVM heap — small single-node broker
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - kafka_data:/bitnami/kafka
    expose:
      - "9092"
    healthcheck:
      # kafka-broker-api-versions.sh returns non-zero if the broker isn't accepting connections.
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - backend
    restart: unless-stopped
    # Give the broker time to flush log segments and leave the controller quorum cleanly
    # on `docker compose down`/restart instead of being SIGKILLed after the default 10s.
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  kafka-init:
    # One-shot topic creation. Idempotent: uses --if-not-exists. Exits 0 on success.
    # The service stays in "exited" state after the first successful run and is
    # re-executed whenever compose is brought up — cheap and safe.
    # bitnamilegacy/* — see broker service comment + #100 for the long-term plan.
    image: bitnamilegacy/kafka:3.8.0
    user: "1001:1001"
    volumes:
      - ../infra/kafka/init-topics.sh:/opt/bitnami/kafka/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/opt/bitnami/kafka/init-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kafka-ui:
    # Admin console for Kafka. Bound to loopback on the VPS — operators reach it
    # via SSH tunnel (ssh -L 8085:127.0.0.1:8085 deploy@vps). Basic auth required.
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: "noorinalabs-pipeline"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: "${KAFKA_UI_USER:?KAFKA_UI_USER must be set}"
      SPRING_SECURITY_USER_PASSWORD: "${KAFKA_UI_PASSWORD:?KAFKA_UI_PASSWORD must be set}"
      # Disable dynamic-config edits from the UI — topic retention is owned by kafka-init.
      KAFKA_CLUSTERS_0_READONLY: "${KAFKA_UI_READONLY:-true}"
    ports:
      - "127.0.0.1:8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
  user-backend:
    driver: bridge
    internal: true

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
  loki_data:
  kafka_data:
  user_pg_data:
  user_redis_data:
